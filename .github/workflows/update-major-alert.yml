name: Alert for available major version updates
on:
  workflow_dispatch:
  schedule:
    # Runs at 23:00, only on Sunday
    - cron: 0 23 * * 0

permissions:
  contents: read

jobs:
  update-major-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/pnpm-setup
      - name: Find outdated major versions
        id: outdated_majors
        run: |
          {
            echo "slack_message<<EOF"
            ./@internal/ci/bin/get-outdated-majors.sh
            echo EOF
          } >> $GITHUB_OUTPUT
      - name: Post to slack
        if: steps.outdated_majors.outputs.slack_message
        uses: slackapi/slack-github-action@0d95c9a7becc1e6e297d76df9bc735c44f4cbcbc # v3.0.5
        with:
          webhook: ${{ secrets.SLACK_DS_UDIR_DEV_WEBHOOK }}
          webhook-type: incoming-webhook
          errors: true
          retries: RAPID
          payload: ${{ steps.outdated_majors.outputs.slack_message }}
