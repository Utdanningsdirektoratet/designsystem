name: Deploy testapp to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'test-apps/nextjs/**'
      - '.github/workflows/azure-testapp-deploy.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - 'test-apps/nextjs/**'
      - '.github/workflows/azure-testapp-deploy.yml'

permissions:
  contents: read

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/pnpm-setup
      - name: Build
        run: pnpm nx run test-apps/nextjs:build
      - name: Install Azure Static Web Apps CLI
        run: pnpm install -g @azure/static-web-apps-cli
      - name: Deploy
        run: swa deploy test-apps/nextjs --deployment-token ${{ secrets.AZURE_TESTAPP_DEPLOYMENT_TOKEN }} --env production
