name: Deploy testapp to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'test-apps/nextjs/**'
      - '.github/workflows/azure-testapp-deploy.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - 'test-apps/nextjs/**'
      - '.github/workflows/azure-testapp-deploy.yml'

permissions:
  contents: read
  packages: write

env:
  APP_PATH: test-apps/nextjs
  IMAGE_NAME: ghcr.io/utdanningsdirektoratet/designsystem-testapp

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build image, push to GHCR, and deploy to Azure Container Apps

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./test-apps/nextjs/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}
          containerAppName: ca-designsystem-testapp
          resourceGroup: rg-designsystem-testapp
          imageToDeploy: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          registryUrl: ghcr.io
