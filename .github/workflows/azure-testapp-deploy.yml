name: Deploy testapp to Azure

on:
  workflow_dispatch:
  push:
    branches:
      - main
env:
  APP_PATH: test-apps/nextjs
  IMAGE_NAME: ghcr.io/utdanningsdirektoratet/designsystem-testapp

jobs:
  check:
    runs-on: ubuntu-latest
    name: Check if deploy should be initiated
    outputs:
      should_deploy: ${{ steps.should_deploy.outputs.should_deploy }}
    permissions:
      contents: read
      actions: 'read'
      pull-requests: 'read'
    steps:
      - name: Check out repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: ./.github/actions/pnpm-setup

      - name: Determine whether to deploy
        id: should_deploy
        run: echo "should_deploy=$(./@internal/ci/bin/should-deploy-testapp.ts)" >> "$GITHUB_OUTPUT"
        env:
          IS_DISPATCH: ${{ github.event_name == 'workflow_dispatch'}}

  build_and_deploy:
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: test-app
    name: Build image, push to GHCR, and deploy to Azure Container Apps
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Check out repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./test-apps/nextjs/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@8dff69dac3367c32ceb2690d8f13adbeab462703 # v2
        with:
          containerAppName: ca-designsystem-testapp
          resourceGroup: rg-designsystem-testapp
          imageToDeploy: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          registryUrl: ghcr.io
          targetPort: 3000
