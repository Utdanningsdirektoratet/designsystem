# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# GitHub recommends pinning actions to a commit SHA.
# To get a newer version, you will need to update the SHA.
# You can also reference a tag or branch, but the action may change without warning.

name: Deploy testapp to Azure

env:
  APP_LOCATION: 'test-apps/nextjs' # location of your client code
  OUTPUT_LOCATION: '' # location of client code build output

on:
  push:
    branches:
      - main
    paths:
      - 'test-apps/nextjs/**'
      - '.github/workflows/azure-testapp-deploy.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - 'test-apps/nextjs/**'
      - '.github/workflows/azure-testapp-deploy.yml'

permissions:
  issues: write
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/pnpm-setup
      - name: build

        run: pnpm nx run test-apps/nextjs:build

      - name: Deploy
        uses: Azure/static-web-apps-deploy@4d27395796ac319302594769cfe812bd207490b1
        env:
          CUSTOM_BUILD_COMMAND: 'pnpm nx run test-apps/nextjs:build'
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_TESTAPP_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: ${{ env.APP_LOCATION }}
          output_location: ${{ env.OUTPUT_LOCATION }}
          skip_app_build: true

  cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_TESTAPP_DEPLOYMENT_TOKEN }}
          action: 'close'
          app_location: ${{ env.APP_LOCATION }}
