name: CI

on:
  push:
    branches:
      - main
      - dev
      - release/*
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  actions: read
  contents: read
  checks: write

jobs:
  main:
    runs-on: ubuntu-latest
    outputs:
      run_ui_tests: ${{ steps.job_condition.outputs.run_ui_tests }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/pnpm-setup

      - name: Print affected packages
        run: pnpm turbo ls --affected

      - name: Determine whether storybook-tests & chromatic need to run
        id: job_condition
        run: echo "run_ui_tests=$(./@internal/build-tools/bin/should-run-ui-tests.ts)" >> "$GITHUB_OUTPUT"
        env:
          IS_PR_READY: ${{ github.event_name == 'pull_request' && !github.event.pull_request.draft }}
          IS_PUSH: ${{ github.event_name == 'push' }}

      - name: Skip 'Storybook Publish' check
        if: steps.job_condition.outputs.run_ui_tests == 'false'
        uses: LouisBrunner/checks-action@937cbbcde3259005b50746dc91cde29098aac2ff # v3.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: Storybook Publish
          conclusion: skipped
      - name: Skip 'UI Tests' check
        if: steps.job_condition.outputs.run_ui_tests == 'false'
        uses: LouisBrunner/checks-action@937cbbcde3259005b50746dc91cde29098aac2ff # v3.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: UI Tests
          conclusion: skipped
      - name: Skip 'UI Review' check
        if: steps.job_condition.outputs.run_ui_tests == 'false'
        uses: LouisBrunner/checks-action@937cbbcde3259005b50746dc91cde29098aac2ff # v3.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: UI Review
          conclusion: skipped

      - name: Validate current commit (last commit) with commitlint
        if: github.event_name == 'push'
        run: pnpm commitlint --last --verbose

      - name: Validate PR commits with commitlint
        if: github.event_name == 'pull_request'
        run: pnpm commitlint --from ${{ github.event.pull_request.base.sha}} --to ${{ github.event.pull_request.head.sha }} --verbose

      - run: pnpm build

      - name: Fail if the build changed any checked-in files
        run: git diff --stat --exit-code

  storybook-tests:
    runs-on: ubuntu-latest
    needs: main
    if: needs.main.outputs.run_ui_tests == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/pnpm-setup
      - name: Run Storybook tests
        run: pnpm turbo run test:storybook --filter=@udir-design/react

  chromatic:
    runs-on: ubuntu-latest
    needs: [main]
    if: needs.main.outputs.run_ui_tests == 'true'
    env:
      CHROMATIC_WORKING_DIR: '@udir-design/react'
      CHROMATIC_STORYBOOK_BUILD_DIR: ./storybook-static
      CHROMATIC_EXIT_ZERO_ON_CHANGES: true
      CHROMATIC_EXIT_ONCE_UPLOADED: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/pnpm-setup

      - name: Build storybook
        run: pnpm turbo run build:docs --filter=@udir-design/react

      - name: Check runtime dependency changes
        id: diff_runtime_deps
        run: |
          pnpm tsx ./@internal/build-tools/bin/diff-runtime-deps.ts --base "${TURBO_SCM_BASE:-main}" \
            && echo "deps_changed=false" >> "$GITHUB_OUTPUT" \
            || echo "deps_changed=true" >> "$GITHUB_OUTPUT"

      - name: Publish Storybook to Chromatic (TurboSnap)
        if: steps.diff_runtime_deps.outputs.deps_changed != 'true'
        uses: chromaui/action@fd9f0848927ca40d7157227eb3a7f771827652bc # v16.7.0
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: ${{ env.CHROMATIC_WORKING_DIR }}
          storybookBuildDir: ${{ env.CHROMATIC_STORYBOOK_BUILD_DIR }}
          exitZeroOnChanges: ${{ env.CHROMATIC_EXIT_ZERO_ON_CHANGES }}
          exitOnceUploaded: ${{ env.CHROMATIC_EXIT_ONCE_UPLOADED }}
          onlyChanged: true
          externals: 'design-tokens/src/**'
          untraced: '@udir-design/react/.storybook/docs/**'

      - name: Publish Storybook to Chromatic (full build)
        if: steps.diff_runtime_deps.outputs.deps_changed == 'true'
        uses: chromaui/action@fd9f0848927ca40d7157227eb3a7f771827652bc # v16.7.0
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: ${{ env.CHROMATIC_WORKING_DIR }}
          storybookBuildDir: ${{ env.CHROMATIC_STORYBOOK_BUILD_DIR }}
          exitZeroOnChanges: ${{ env.CHROMATIC_EXIT_ZERO_ON_CHANGES }}
          exitOnceUploaded: ${{ env.CHROMATIC_EXIT_ONCE_UPLOADED }}
          onlyChanged: false

  release:
    needs: [main, storybook-tests, chromatic]
    if: |
      always() && !failure() && !cancelled() &&
      (github.event_name == 'push' || github.event_name == 'pull_request') &&
      startsWith( (github.base_ref || github.ref_name), 'release/')
    uses: ./.github/workflows/release.yml
    with:
      dry-run: false
    secrets: inherit
    permissions:
      actions: read
      contents: write
      pull-requests: write
      id-token: write

  deploy-docs:
    runs-on: ubuntu-latest
    needs: [release]
    # Deploy on pushes to main & release/* branches
    if: |
      always() && !failure() && !cancelled() &&
      github.event_name == 'push' &&
      (github.ref_name == 'main' || startsWith(github.ref_name, 'release/'))
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/pnpm-setup

      - name: Build storybook
        run: pnpm turbo run build:docs --filter=@udir-design/react

      - shell: bash
        env:
          BRANCH: ${{ github.ref_name }}
        run: echo "DESTINATION_PATH=${BRANCH/release\//}" >> $GITHUB_ENV
      - uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3.0.0
        name: Empty target directory
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.DOCS_STORAGE_CONNECTION_STRING}}
        with:
          azcliversion: 2.78.0
          inlineScript: |
            az storage blob delete-batch --account-name stdesignsystemdocs -s '$web' --pattern "$DESTINATION_PATH/*"
      - uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3.0.0
        name: Upload to target directory
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.DOCS_STORAGE_CONNECTION_STRING}}
        with:
          azcliversion: 2.78.0
          inlineScript: |
            az storage blob upload-batch --account-name stdesignsystemdocs -s @udir-design/react/storybook-static -d '$web' --destination-path $DESTINATION_PATH
