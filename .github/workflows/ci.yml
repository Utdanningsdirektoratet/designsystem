name: CI

on:
  push:
    branches:
      - main
      - dev
      - release/*
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - closed

permissions:
  actions: read
  contents: read
  checks: write
  pull-requests: write

jobs:
  main:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    outputs:
      run_ui_tests: ${{ steps.job_condition.outputs.run_ui_tests }}
      run_nextjs_smoke: ${{ steps.job_condition.outputs.run_nextjs_smoke }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/pnpm-setup

      - name: Print affected packages
        run: pnpm turbo ls --affected

      - name: Determine which conditional jobs need to run
        id: job_condition
        run: |
          echo "run_ui_tests=$(./@internal/ci/bin/should-run-ui-tests.ts)" >> "$GITHUB_OUTPUT"
          echo "run_nextjs_smoke=$(./@internal/ci/bin/should-run-nextjs-smoke.ts)" >> "$GITHUB_OUTPUT"
        env:
          IS_PR_READY: ${{ github.event_name == 'pull_request' && !github.event.pull_request.draft }}
          IS_PUSH: ${{ github.event_name == 'push' }}

      - name: Skip 'Storybook Publish' check
        if: steps.job_condition.outputs.run_ui_tests == 'false'
        uses: LouisBrunner/checks-action@937cbbcde3259005b50746dc91cde29098aac2ff # v3.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: Storybook Publish
          conclusion: skipped
      - name: Skip 'UI Tests' check
        if: steps.job_condition.outputs.run_ui_tests == 'false'
        uses: LouisBrunner/checks-action@937cbbcde3259005b50746dc91cde29098aac2ff # v3.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: UI Tests
          conclusion: skipped
      - name: Skip 'UI Review' check
        if: steps.job_condition.outputs.run_ui_tests == 'false'
        uses: LouisBrunner/checks-action@937cbbcde3259005b50746dc91cde29098aac2ff # v3.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: UI Review
          conclusion: skipped
      - name: Skip 'chromatic / chromatic' check
        if: steps.job_condition.outputs.run_ui_tests == 'false'
        uses: LouisBrunner/checks-action@937cbbcde3259005b50746dc91cde29098aac2ff # v3.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: chromatic / chromatic
          conclusion: skipped
      - name: Skip 'Next.js Smoke Test' check
        if: steps.job_condition.outputs.run_nextjs_smoke == 'false'
        uses: LouisBrunner/checks-action@937cbbcde3259005b50746dc91cde29098aac2ff # v3.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: Next.js Smoke Test
          conclusion: skipped

      - name: Validate current commit (last commit) with commitlint
        if: github.event_name == 'push'
        run: pnpm commitlint --last --verbose

      - name: Validate PR commits with commitlint
        if: github.event_name == 'pull_request'
        run: pnpm commitlint --from ${{ github.event.pull_request.base.sha}} --to ${{ github.event.pull_request.head.sha }} --verbose

      - run: pnpm build

      - name: Fail if the build changed any checked-in files
        run: git diff --stat --exit-code

  storybook-tests:
    runs-on: ubuntu-latest
    needs: main
    if: needs.main.outputs.run_ui_tests == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/pnpm-setup
      - name: Run Storybook tests
        run: pnpm turbo run test:storybook --filter=@udir-design/react

  chromatic:
    needs: [main]
    # On PRs, require the 'chromatic' label to run (conserves snapshot credits).
    # On pushes to protected branches, always run. Remove label gate when no longer needed.
    if: |
      needs.main.outputs.run_ui_tests == 'true' &&
      (github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'chromatic'))
    uses: ./.github/workflows/chromatic.yml
    secrets:
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}

  nextjs-smoke-test:
    runs-on: ubuntu-latest
    needs: main
    if: needs.main.outputs.run_nextjs_smoke == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/pnpm-setup
      - name: Run Next.js smoke test
        run: pnpm turbo run test:e2e --filter=test-app-nextjs

  release:
    needs: [main, storybook-tests, chromatic, nextjs-smoke-test]
    if: |
      always() && !failure() && !cancelled() &&
      (github.event_name == 'push' || github.event_name == 'pull_request') &&
      startsWith( (github.base_ref || github.ref_name), 'release/')
    uses: ./.github/workflows/release.yml
    with:
      dry-run: false
    secrets: inherit
    permissions:
      actions: read
      contents: write
      pull-requests: write
      id-token: write

  deploy-docs:
    needs: [release]
    # Deploy on pushes to main & release/* branches
    if: |
      always() && !failure() && !cancelled() &&
      github.event_name == 'push' &&
      (github.ref_name == 'main' || startsWith(github.ref_name, 'release/'))
    uses: ./.github/workflows/deploy-docs.yml
    with:
      destination-path: ${{ github.ref_name }}
      environment: docs
    secrets: inherit

  deploy-docs-preview:
    needs: [main]
    if: |
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      !startsWith(github.base_ref, 'release/') &&
      needs.main.outputs.run_ui_tests == 'true'
    uses: ./.github/workflows/deploy-docs.yml
    with:
      destination-path: pr-${{ github.event.pull_request.number }}
      environment: docs-preview
      post-preview-comment: true
    secrets: inherit

  cleanup-docs-preview:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    environment: docs-preview
    steps:
      - uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3.0.0
        name: Delete preview blobs
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.DOCS_STORAGE_CONNECTION_STRING}}
        with:
          azcliversion: 2.78.0
          inlineScript: |
            az storage blob delete-batch --account-name stdesignsystemdocs -s '$web' --pattern "pr-${{ github.event.pull_request.number }}/*"

      - name: Delete preview comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr comment "$PR_NUMBER" --delete-last --yes || true
