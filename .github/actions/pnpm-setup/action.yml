name: Prepare pnpm & CI caches
description: Installs pnpm, sets up the pnpm + Turborepo caches, and sets the Nx hashes
inputs:
  registry-url:
    description: |
      Optional registry to set up for auth. Will set the registry in a project level
      .npmrc and .yarnrc file, and set up auth to read in from env.NODE_AUTH_TOKEN.
    default: ''

runs:
  using: 'composite'
  steps:
    # Note: pnpm version is set in package.json "packageManager"
    - name: Install pnpm
      uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6

    # Cache node_modules
    # Note: node version is set in package.json "engines.node"
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: 'package.json'
        cache: 'pnpm'
        registry-url: ${{ inputs.registry-url }}

    - run: pnpm install
      shell: bash

    # Turborepo remote cache via GitHub Actions cache
    - name: Cache Turborepo
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: .turbo/cache
        key: turbo-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          turbo-${{ runner.os }}-

    - uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1
      with:
        main-branch-name: ${{ github.base_ref || github.ref_name }}
