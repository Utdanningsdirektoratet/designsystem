catalogMode: strict

catalogs:
  react18:
    '@types/react': ^18.3.27
    '@types/react-dom': ^18.3.7
    react: ^18.3.1
    react-dom: ^18.3.1

cleanupUnusedCatalogs: true

disallowWorkspaceCycles: true

ignoredOptionalDependencies:
  - '@parcel/watcher'

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - '@digdir/*'
  - '@u-elements/*'

overrides:
  axios@>=1.0.0 <1.15.0: '>=1.15.0'
  postcss@<8.5.10: ^8.5.10
  semver@<7: ^7

packageExtensions:
  '@navikt/aksel-icons':
    peerDependencies:
      '@types/react': ^18.3.11 || ^19.0.0
      react: ^18.3.1 || ^19.0.0
    peerDependenciesMeta:
      '@types/react':
        optional: true
      react:
        optional: true

patchedDependencies:
  remark-heading-id@1.0.1: patches/remark-heading-id@1.0.1.patch

syncInjectedDepsAfterScripts:
  - inject

trustPolicy: no-downgrade

trustPolicyExclude:
  # ast-v8-to-istanbul@1.0.2 is safe according to https://socket.dev/npm/package/ast-v8-to-istanbul/overview/1.0.2
  - ast-v8-to-istanbul@1.0.2
  # eslint-import-resolver-typescript@3.10.1 was published manually 1 year ago,
  # and was already in our lock file due to being a dependency of eslint-config-next
  - eslint-import-resolver-typescript@3.10.1
  # detect-port@1.6.1 was published manually 2 years ago,
  # and was already in our lock file due to being a dependency of @nx/js
  - detect-port@1.6.1
  # tinyexec@1.2.2 is safe according to https://github.com/tinylibs/tinyexec/issues/136
  # and https://socket.dev/npm/package/tinyexec/overview/1.2.2
  - tinyexec@1.2.2
