<link
  rel="preload stylesheet"
  as="style"
  href="https://altinncdn.no/fonts/inter/v4/inter.css"
/>
<script>
  document.documentElement.lang = 'nb';

  // Forward ⌘K / Ctrl+K to the manager frame so Pagefind's modal opens
  // instead of Storybook's "Find components"
  document.addEventListener(
    'keydown',
    (e) => {
      if (e.key === 'k' && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        e.stopPropagation();
        window.parent.postMessage('pagefind:open', '*');
      }
    },
    { capture: true },
  );
</script>
